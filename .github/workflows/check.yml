name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
      - name: Set up Node for tasks-lint
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cache @tasks-md/lint downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: tasks-lint-${{ runner.os }}-v1
      - name: Install @tasks-md/lint globally
        # Pinned in CI so `make audit` uses the on-PATH binary (no network call
        # on cache hit) instead of falling through to the `npx --yes` lane.
        run: npm install -g @tasks-md/lint
      - name: shellcheck
        run: make lint

      - name: audit
        run: make audit

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache test results
        id: test-cache
        uses: actions/cache@v4
        with:
          path: .test-cache-*
          key: tests-${{ runner.os }}-${{ hashFiles('Makefile', 'bin/taskgrind', 'lib/*.sh', 'tests/*.bats', 'tests/test_helper.bash', 'tests/verify-bash32-compat.sh', 'install.sh') }}

      - name: Set up Node for tasks-lint
        if: steps.test-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bats (Linux)
        if: runner.os == 'Linux' && steps.test-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq npm parallel shellcheck
          sudo npm install -g bats @tasks-md/lint

      - name: Install bats (macOS)
        if: runner.os == 'macOS' && steps.test-cache.outputs.cache-hit != 'true'
        run: |
          brew install bats-core parallel shellcheck
          npm install -g @tasks-md/lint

      - name: Run tests
        if: steps.test-cache.outputs.cache-hit != 'true'
        env:
          TEST_JOBS: '2'
        run: |
          make test

      - name: Tests cached
        if: steps.test-cache.outputs.cache-hit == 'true'
        run: echo "Tests cached — restored active .test-cache-* files for this runner"
