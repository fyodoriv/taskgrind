name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
      - name: shellcheck
        run: make lint

      - name: audit
        run: make audit

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache test results
        id: test-cache
        uses: actions/cache@v4
        with:
          path: .test-cache-*
          key: tests-${{ runner.os }}-${{ hashFiles('Makefile', 'bin/taskgrind', 'lib/*.sh', 'tests/*.bats', 'tests/test_helper.bash') }}

      - name: Install bats (Linux)
        if: runner.os == 'Linux' && steps.test-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq npm parallel
          sudo npm install -g bats

      - name: Install bats (macOS)
        if: runner.os == 'macOS' && steps.test-cache.outputs.cache-hit != 'true'
        run: brew install bats-core parallel

      - name: Run tests
        if: steps.test-cache.outputs.cache-hit != 'true'
        run: |
          make test

      - name: Tests cached
        if: steps.test-cache.outputs.cache-hit == 'true'
        run: echo "Tests cached — restored active .test-cache-* files for this runner"
